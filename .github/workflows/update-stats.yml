name: Update README Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_readme.py"
      - "scripts/generate_cards.py"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 # Fetches all history for a clean rebase

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install system and python dependencies
        run: |
          sudo apt-get update -qq
          # Fix for libasound transition in Ubuntu 24.04
          sudo apt-get install -y libasound2t64
          pip install requests

      - name: Run stats scraper + card generator
        run: python scripts/update_readme.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md assets/
          
          # Only proceed if there are actual changes
          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git commit -m "chore: update stats [skip ci]"
          
          # Rebase handles the "fetch first" error by putting your commit 
          # at the tip of the branch if the remote has changed.
          git pull --rebase origin main
          git push
