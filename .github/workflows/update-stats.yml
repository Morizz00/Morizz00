name: Update README Stats

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - "scripts/update_readme.py"
      - "scripts/scrape_tensortonic.js"

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write

jobs:
  update-readme:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Python dependencies
        run: pip install requests

      - name: Install Node dependencies (Puppeteer)
        working-directory: scripts
        run: |
          npm init -y
          npm install puppeteer

      - name: Install Chromium system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            libnss3 libatk1.0-0 libatk-bridge2.0-0 libcups2 \
            libdrm2 libxkbcommon0 libxcomposite1 libxdamage1 \
            libxfixes3 libxrandr2 libgbm1 libasound2

      - name: Run stats scraper
        env:
          TT_EMAIL:    ${{ secrets.TT_EMAIL }}
          TT_PASSWORD: ${{ secrets.TT_PASSWORD }}
        run: python scripts/update_readme.py

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add README.md
          git diff --cached --quiet && echo "No changes to commit" || \
            (git commit -m "chore: update stats [skip ci]" && git push)
